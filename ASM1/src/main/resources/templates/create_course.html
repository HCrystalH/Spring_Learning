<form action="#" th:action="@{/courses/create}" th:object="${course}"
      method="post">
    <div>
        <label for="title">Course Title:</label>
        <input type="text" id="title" th:field="*{title}" />
        <div th:if="${#fields.hasErrors('title')}"
             th:errors="*{title}"
             style="color: red;"></div>
    </div>
    <!-- Add other form fields similarly -->

    <div>
        <label for="instructorName">Instructor Name:</label>
        <input type="text" id="instructorName" th:field="*{instructorName}" />
        <div th:if="${#fields.hasErrors('instructorName')}"
             th:errors="*{instructorName}"
             style="color: red;"></div>
    </div>

    <!--    Instructor email-->
    <div>
        <label for="instructorEmail">Instructor email:</label>
        <input type="text" id="instructorEmail" th:field="*{instructorEmail}" />
        <div th:if="${#fields.hasErrors('instructorEmail')}"
             th:errors="*{instructorEmail}"
             style="color: red;"></div>
    </div>
<!--    Description -->
    <div>
        <label for="description">Description:</label>
        <input type="text" id="description" th:field="*{description}" />
        <div th:if="${#fields.hasErrors('description')}"
             th:errors="*{description}"
             style="color: red;"></div>
    </div>
<!--    durationHours-->
    <div>
        <label for="durationHours">durationHours:</label>
        <input type="text" id="durationHours" th:field="*{durationHours}" />
        <div th:if="${#fields.hasErrors('durationHours')}"
             th:errors="*{durationHours}"
             style="color: red;"></div>
    </div>

    <button type="submit">Create Course</button>
</form>
