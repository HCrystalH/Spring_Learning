<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="en">
<head th:replace="fragments/header :: head('Recent Reviews')"></head>
<body>
    <div th:replace="fragments/nav-public :: nav"></div>

    <div class="container">
        <div class="main-content">
            <section class="section">

                <!-- Header -->
                <h2>Most Recent Reviews</h2>

                <!-- Cards - body -->
                <div th:each="review : ${reviews}" class="review-full-card">
                    <div class="review-course-title">
                        <a th:href="@{/courses/{id}(id=${review.course.id})}" th:text="${review.course.title}">Course Title</a>
                    </div>
                    <strong th:text="${review.authorName}">Author</strong>
                    <div class="stars" th:text="${#strings.repeat('★', review.rating) + #strings.repeat('☆', 5 - review.rating)}"></div>
                    <p th:text="${review.content}">Review content</p>
                </div>

                <div th:if="${reviews.isEmpty()}" class="empty-state">
                    <p>No reviews yet.</p>
                </div>

            </section>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
</body>

</html>
