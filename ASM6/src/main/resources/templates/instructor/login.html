<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="en">

<head th:replace="fragments/header :: head('Instructor Login')">
    <title>Instructor Login</title>
</head>
<body>
    <div th:replace="fragments/nav-public :: nav"></div>

    <div class ="container">
        <div class="login-container">
            <h2> Instructor Login </h2>

            <div th:if="${error}" class="alert alert-error" th:text="${error}"> Error Message </div>
            <form th:action="@{/instructor/login}" method="post" class="login-form">
                <div class="form-group">
                    <label for="username"> Username</label>
                    <input type="text" id="username" name="username" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="password"> Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>

</body>
</html>
