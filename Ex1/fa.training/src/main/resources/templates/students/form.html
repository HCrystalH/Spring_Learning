<!DOCTYPE html>
<html th:replace="~{layout/main :: main('Student Form', ~{:: div.main-content})}">
<body>
<div class="main-content">
    <h2 style="color: #1a237e; font-weight: 600;" th:text="${student.id == null} ? 'Add a new Student' : 'Edit Student'"></h2>
    <hr>

    <form th:action="@{/students/save}" th:object="${student}" method="post" class="row g-3 bg-white p-4 rounded shadow-sm" style="max-width: 600px;">
        <input type="hidden" th:field="*{id}">

        <div class="col-12">
            <label class="form-label fw-semibold">Full Name</label>
            <input type="text" th:field="*{name}" class="form-control" required>
        </div>
        <div class="col-12">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" th:field="*{email}" class="form-control" required>
        </div>
        <div class="col-12">
            <label class="form-label fw-semibold">Major</label>
            <input type="text" th:field="*{major}" class="form-control" required>
        </div>
        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-success px-4">
                <i class="bi bi-save"></i> Save
            </button>
            <a th:href="@{/students}" class="btn btn-secondary px-4 ms-2">
                <i class="bi bi-x-circle"></i> Cancel
            </a>
        </div>
    </form>
</div>
</body>
</html>
