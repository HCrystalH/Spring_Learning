<!DOCTYPE html>
<html th:replace="~{layout/main :: main('Students Management', ~{:: div.main-content})}">
<body>
<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 style="color: #1a237e; font-weight: 600;">Students Management</h2>
        <a th:href="@{/students/create}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Add a new Student
        </a>
    </div>

    <table class="table table-bordered table-hover bg-white">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Major</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="st : ${students}">
            <td th:text="${st.id}"></td>
            <td th:text="${st.name}"></td>
            <td th:text="${st.email}"></td>
            <td th:text="${st.major}"></td>
            <td>
                <a th:href="@{/students/edit/{id}(id=${st.id})}" class="btn btn-warning btn-sm">
                    <i class="bi bi-pencil"></i> Edit
                </a>
                <a th:href="@{/students/delete/{id}(id=${st.id})}" class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this student?')">
                    <i class="bi bi-trash"></i> Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
