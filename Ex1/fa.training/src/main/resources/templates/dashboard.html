<!DOCTYPE html>
<html th:replace="~{layout/main :: main('Dashboard', ~{:: div.main-content})}">
<body>
<div class="main-content">
    <div style="display: flex; align-items: center; justify-content: center; height: 100%;">
        <div style="text-align: center;">
            <h1 style="color: #1a237e; font-weight: 700;">WELCOME TO LMS MANAGEMENT SYSTEM</h1>
            <p style="color: #666; font-size: 1.2rem; margin-top: 10px;">BASED ON SPRING FRAMEWORK</p>
            <div style="margin-top: 40px; display: flex; gap: 20px; justify-content: center;">
                <a th:href="@{/courses/create}" class="btn btn-primary btn-lg">
                    <i class="bi bi-plus-circle"></i> Add a new Course
                </a>
                <a th:href="@{/courses}" class="btn btn-success btn-lg">
                    <i class="bi bi-collection"></i> Courses Management
                </a>
                <a th:href="@{/students}" class="btn btn-info btn-lg text-white">
                    <i class="bi bi-people"></i> Students Management
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
