<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title th:text="${pageTitle} ?: 'LMS Management System'">LMS Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/styles.css}">
</head>

<body>

<header th:fragment="header">

    <div class="header-bar">

        <div class="logo-area">
            <i class="bi bi-book-fill"></i>
            <h4>LMS MANAGEMENT SYSTEM</h4>
        </div>

        <div class="header-right">

            <div class="search-box">
                <i class="bi bi-search"></i>
                <input type="text" placeholder="Search...">
            </div>

            <i class="bi bi-person-circle user-icon"></i>

        </div>

    </div>

</header>

<nav th:fragment="sidebar">

    <div class="sidebar">

        <a th:href="@{/courses/create}" class="nav-item">
            <i class="bi bi-plus-circle"></i>
            Add a new Course
        </a>

        <a th:href="@{/courses}" class="nav-item">
            <i class="bi bi-collection"></i>
            Courses Management
        </a>

        <a th:href="@{/students}" class="nav-item">
            <i class="bi bi-people"></i>
            Students Management
        </a>

        <a th:href="@{/dashboard}" class="nav-item">
            <i class="bi bi-house-door"></i>
            Dashboard
        </a>

    </div>

</nav>


<footer th:fragment="footer">

    <div class="footer-bar">

        © 2023 - All rights reserved - Built with Spring Framework

        <span class="social-icons">

            <a href="#">
                <i class="bi bi-facebook"></i>
            </a>

            <a href="#">
                <i class="bi bi-twitter-x"></i>
            </a>

            <a href="#">
                <i class="bi bi-linkedin"></i>
            </a>

        </span>

    </div>

</footer>


<div th:fragment="scripts">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</div>

</body>
</html>
