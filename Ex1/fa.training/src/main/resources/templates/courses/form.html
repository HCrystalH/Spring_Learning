<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: main(
            'Add New Course',
            ~{::main}
      )}">

<main class="main-content">

    <!-- Success Message -->
    <div th:if="${success}"
         class="alert alert-success alert-dismissible fade show"
         role="alert">

        <i class="bi bi-check-circle-fill"></i>
        Add a new Course successfully!

        <button type="button"
                class="btn-close"
                data-bs-dismiss="alert">
        </button>

    </div>

    <!-- Page Header -->
    <section class="mb-4">

        <h2 class="page-title">
            Create New Course
        </h2>

        <p class="text-muted">
            Fill in the information below to create a new course.
        </p>

        <div th:if="${success}" class="mt-3">

            <a th:href="@{/lessons/{cid}(cid=${course.courseId.courseCode + '_' + course.courseId.startDate})}"
               class="btn btn-outline-info">

                <i class="bi bi-book"></i>
                Lesson Detail

            </a>

        </div>

    </section>

    <hr>

    <!-- Course Form -->
    <form th:action="@{/courses/save}"
          th:object="${course}"
          method="post"
          class="row g-3 bg-white rounded shadow-sm p-4 course-form">

        <!-- Course Code -->
        <div class="col-md-6">

            <label class="form-label fw-semibold">
                Course ID
            </label>

            <input
                    type="text"
                    th:field="*{courseId.courseCode}"
                    class="form-control"
                    placeholder="e.g. CRS101"
                    required>

        </div>

        <!-- Start Date -->
        <div class="col-md-6">

            <label class="form-label fw-semibold">
                Start Date
            </label>

            <input
                    type="date"
                    th:field="*{courseId.startDate}"
                    class="form-control"
                    required>

        </div>

        <!-- Course Name -->
        <div class="col-12">

            <label class="form-label fw-semibold">
                Course Name
            </label>

            <input
                    type="text"
                    th:field="*{courseName}"
                    class="form-control"
                    placeholder="Enter course name"
                    required>

        </div>

        <!-- Category -->
        <div class="col-md-6">

            <label class="form-label fw-semibold">
                Category
            </label>

            <select th:field="*{category}"
                    class="form-select"
                    required>

                <option value="">-- Select Category --</option>
                <option value="Programming">Programming</option>
                <option value="Database">Database</option>
                <option value="Web Development">Web Development</option>
                <option value="Mobile Development">Mobile Development</option>
                <option value="DevOps">DevOps</option>
                <option value="AI & Machine Learning">AI & Machine Learning</option>

            </select>

        </div>

        <!-- Instructor -->
        <div class="col-md-6">

            <label class="form-label fw-semibold">
                Instructor
            </label>

            <input
                    type="text"
                    th:field="*{instructor}"
                    class="form-control"
                    placeholder="Enter instructor name"
                    required>

        </div>

        <!-- Actions -->
        <div class="col-12 mt-4">

            <button type="submit"
                    class="btn btn-success">

                <i class="bi bi-save"></i>
                Save Course

            </button>

            <a th:href="@{/courses}"
               class="btn btn-secondary ms-2">

                <i class="bi bi-x-circle"></i>
                Cancel
            </a>

        </div>

    </form>

</main>

</html>
