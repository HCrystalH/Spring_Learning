<!DOCTYPE html>
<html th:replace="~{layout/main :: main('Courses Management', ~{:: div.main-content})}">
<body>
<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 style="color: #1a237e; font-weight: 600;">Courses Management</h2>
        <a th:href="@{/courses/create}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Add a new Course
        </a>
    </div>

    <div th:if="${#lists.isEmpty(courses)}" class="alert alert-info">
        No courses found. <a th:href="@{/courses/create}" class="alert-link">Add your first course</a>.
    </div>

    <table class="table table-bordered table-hover bg-white" th:unless="${#lists.isEmpty(courses)}">
        <thead class="table-dark">
        <tr>
            <th>Course Code</th>
            <th>Start Date</th>
            <th>Course Name</th>
            <th>Category</th>
            <th>Instructor</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${courses}">
            <td th:text="${c.courseId.courseCode}"></td>
            <td th:text="${c.courseId.startDate}"></td>
            <td th:text="${c.courseName}"></td>
            <td th:text="${c.category}"></td>
            <td th:text="${c.instructor}"></td>
            <td>
                <a th:href="@{/lessons/{cid}(cid=${c.courseId.courseCode + '_' + c.courseId.startDate})}" class="btn btn-info btn-sm text-white">
                    <i class="bi bi-book"></i> Lessons
                </a>
                <a th:href="@{/courses/delete/{id}(id=${c.courseId.courseCode + '_' + c.courseId.startDate})}" class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this course? This will also delete all lessons in this course.')">
                    <i class="bi bi-trash"></i> Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
