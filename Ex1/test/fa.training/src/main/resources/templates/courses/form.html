<!DOCTYPE html>
<html th:replace="~{layout/main :: main('Add a new Course', ~{:: div.main-content})}">
<body>
<div class="main-content">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill"></i> Add a new Course successfully!
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <h2 style="color: #1a237e; font-weight: 600; margin-bottom: 4px;">Create New Course</h2>

    <div th:if="${success and course != null}" class="mb-3">
        <a th:href="@{/lessons/{cid}(cid=${course.courseId.courseCode + '_' + course.courseId.startDate})}" class="btn btn-outline-info btn-sm">
            <i class="bi bi-book"></i> Lesson Detail
        </a>
    </div>
    <hr>

    <form th:action="@{/courses/save}" th:object="${course}" method="post" class="row g-3 bg-white p-4 rounded shadow-sm" style="max-width: 700px;">
        <div class="col-md-6">
            <label class="form-label fw-semibold">Course ID</label>
            <input type="text" th:field="*{courseId.courseCode}" class="form-control" placeholder="e.g. CRS101" required>
        </div>
        <div class="col-md-6">
            <label class="form-label fw-semibold">Start Date</label>
            <input type="date" th:field="*{courseId.startDate}" class="form-control" required>
        </div>
        <div class="col-12">
            <label class="form-label fw-semibold">Course Name</label>
            <input type="text" th:field="*{courseName}" class="form-control" placeholder="Enter course name" required>
        </div>
        <div class="col-md-6">
            <label class="form-label fw-semibold">Category</label>
            <select th:field="*{category}" class="form-select" required>
                <option value="">-- Select Category --</option>
                <option value="Programming">Programming</option>
                <option value="Database">Database</option>
                <option value="Web Development">Web Development</option>
                <option value="Mobile Development">Mobile Development</option>
                <option value="DevOps">DevOps</option>
                <option value="AI & Machine Learning">AI & Machine Learning</option>
            </select>
        </div>
        <div class="col-md-6">
            <label class="form-label fw-semibold">Instructor</label>
            <input type="text" th:field="*{instructor}" class="form-control" placeholder="Enter instructor name" required>
        </div>
        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-success px-4">
                <i class="bi bi-save"></i> Save Course
            </button>
            <a th:href="@{/courses}" class="btn btn-secondary px-4 ms-2">
                <i class="bi bi-x-circle"></i> Cancel
            </a>
        </div>
    </form>
</div>
</body>
</html>
