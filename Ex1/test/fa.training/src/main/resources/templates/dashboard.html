<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }

        .dashboard-header {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            color: white;
            padding: 40px 0;
            margin-bottom: 30px;
        }

        .dashboard-card {
            transition: 0.3s;
            border: none;
            border-radius: 15px;
        }

        .dashboard-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .card-icon {
            font-size: 3rem;
        }
    </style>
</head>
<body>

<div class="dashboard-header text-center">
    <div class="container">
        <h1>Student Management System</h1>
        <p class="lead">Welcome to the Administration Dashboard</p>
    </div>
</div>

<div class="container">
    <div class="row g-4">

        <!-- Students -->
        <div class="col-md-4">
            <div class="card dashboard-card shadow-sm">
                <div class="card-body text-center">
                    <div class="card-icon mb-3">🎓</div>
                    <h4>Students</h4>
                    <p>Manage student records.</p>
                    <a th:href="@{/students}" class="btn btn-primary">
                        Open
                    </a>
                </div>
            </div>
        </div>

        <!-- Courses -->
        <div class="col-md-4">
            <div class="card dashboard-card shadow-sm">
                <div class="card-body text-center">
                    <div class="card-icon mb-3">📚</div>
                    <h4>Courses</h4>
                    <p>Manage courses and subjects.</p>
                    <a th:href="@{/courses}" class="btn btn-success">
                        Open
                    </a>
                </div>
            </div>
        </div>

        <!-- Reports -->
        <div class="col-md-4">
            <div class="card dashboard-card shadow-sm">
                <div class="card-body text-center">
                    <div class="card-icon mb-3">📊</div>
                    <h4>Reports</h4>
                    <p>View statistics and reports.</p>
                    <a href="#" class="btn btn-warning">
                        Open
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
