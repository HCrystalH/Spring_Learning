<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thông tin Sinh viên</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2 th:text="${student.id == null} ? 'Thêm Sinh viên' : 'Cập nhật Sinh viên'"></h2>

<form th:action="@{/students/save}" th:object="${student}" method="post" class="col-md-6">
    <input type="hidden" th:field="*{id}">

    <div class="mb-3">
        <label class="form-label">Họ và tên</label>
        <input type="text" th:field="*{name}" class="form-gradient form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" th:field="*{email}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Chuyên ngành</label>
        <input type="text" th:field="*{major}" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-success">Lưu</button>
    <a th:href="@{/students}" class="btn btn-secondary">Hủy</a>
</form>
</body>
</html>
