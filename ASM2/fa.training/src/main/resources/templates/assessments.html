<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Assessment Materials</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>

<div class="container">
    <h1> Assessment Materials</h1>

    <div class="card">

        <div th:if="${message}"
             class="success"
             th:text="${message}">
        </div>

        <div th:if="${error}"
             class="error"
             th:text="${error}">
        </div>

        <form th:action="@{/assessments/upload}"
              method="post"
              enctype="multipart/form-data">

            <div class="form-group">
                <label for="title">Assessment Title</label>
                <input type="text"
                       id="title"
                       name="title"
                       required>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description"
                          name="description"
                          rows="4"></textarea>
            </div>

            <div class="form-group">
                <label for="file">Upload File</label>
                <input type="file"
                       id="file"
                       name="file"
                       required>
            </div>

            <button type="submit" class="btn">Upload Material </button>

        </form>
    </div>

    <div class="table-card">

        <h2 style="margin-bottom: 20px;">
            Uploaded Materials
        </h2>

        <table>

            <thead>
            <tr>
                <th>Title</th>
                <th>Description</th>
                <th>Download</th>
            </tr>
            </thead>

            <tbody>

            <tr th:if="${#lists.isEmpty(materials)}">
                <td colspan="3" class="empty-message">
                    No assessment materials uploaded yet.
                </td>
            </tr>

            <tr th:each="material : ${materials}">
                <td th:text="${material.title}"></td>

                <td th:text="${material.description}"></td>

                <td>
                    <a class="download-btn"
                       th:href="@{/assessments/download/{fn}(fn=${material.fileName})}">
                        Download
                    </a>
                </td>
            </tr>

            </tbody>

        </table>

    </div>
</div>

</body>
</html>
